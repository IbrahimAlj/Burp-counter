<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BURP COUNTER 💨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --card: #161616; --accent: #d4f53c; --accent2: #ff4f4f;
      --text: #f5f5f5; --muted: #555; --glow: rgba(212,245,60,0.35);
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    .bg-bubble {
      position: fixed; border-radius: 50%; opacity: 0.04; background: var(--accent);
      pointer-events: none; animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(1); opacity: 0.04; }
      100% { transform: translateY(-20vh) scale(1.3); opacity: 0; }
    }
    .wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 2rem; z-index: 10; padding: 2rem; width: min(480px, 100%);
    }
    .title {
      font-family: 'Rubik Bubbles', cursive; font-size: clamp(2.8rem,10vw,4.5rem);
      color: var(--accent); text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow);
      letter-spacing: 2px; text-align: center; animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow); }
      50%      { text-shadow: 0 0 60px var(--glow), 0 0 120px var(--glow), 0 0 4px #fff; }
    }
    .subtitle { font-size: 0.8rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); margin-top: -1.5rem; }
    .counter-card {
      background: var(--card); border: 1px solid #2a2a2a; border-radius: 24px;
      padding: 2.5rem 3rem; width: 100%; text-align: center;
      box-shadow: 0 0 0 1px #1e1e1e, inset 0 1px 0 #2a2a2a;
    }
    .count-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .count-display { font-family: 'Rubik Bubbles', cursive; font-size: clamp(5rem,22vw,8rem); color: var(--text); line-height: 1; display: inline-block; }
    .count-display.bump { animation: bump 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes bump {
      0%  { transform: scale(1); }
      40% { transform: scale(1.18); color: var(--accent); }
      100%{ transform: scale(1); }
    }
    .streak-bar { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1rem; font-size: 0.75rem; color: var(--muted); font-weight: 700; letter-spacing: 2px; }
    .streak-dots { display: flex; gap: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.2s, transform 0.2s; }
    .dot.active { background: var(--accent); transform: scale(1.3); box-shadow: 0 0 8px var(--glow); }
    .burp-btn {
      width: 100%; padding: 1.3rem 2rem; background: var(--accent); color: #0d0d0d;
      border: none; border-radius: 16px; font-family: 'Rubik Bubbles', cursive;
      font-size: 1.8rem; cursor: pointer; letter-spacing: 2px;
      box-shadow: 0 4px 0 #9bb82a, 0 0 40px rgba(212,245,60,0.2);
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .burp-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #9bb82a, 0 0 20px rgba(212,245,60,0.1); }
    .burp-btn:hover:not(:active) { box-shadow: 0 4px 0 #9bb82a, 0 0 60px rgba(212,245,60,0.35); }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; width: 100%; }
    .ctrl-btn {
      padding: 0.8rem; border-radius: 12px; border: 1px solid #2a2a2a;
      background: var(--card); color: var(--text); font-family: 'Syne', sans-serif;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .ctrl-btn:hover { border-color: #444; background: #1e1e1e; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.danger { border-color: #3a1a1a; color: var(--accent2); }
    .ctrl-btn.danger:hover { border-color: var(--accent2); background: #1e1010; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; width: 100%; }
    .stat-box { background: var(--card); border: 1px solid #2a2a2a; border-radius: 14px; padding: 1rem 0.5rem; text-align: center; }
    .stat-value { font-family: 'Rubik Bubbles', cursive; font-size: 1.6rem; color: var(--accent); }
    .stat-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }
    .particle { position: fixed; pointer-events: none; font-size: 1.5rem; animation: burst 0.8s ease-out forwards; z-index: 99; }
    @keyframes burst {
      0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.5); opacity: 0; }
    }
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent); color: #0d0d0d; padding: 0.6rem 1.5rem;
      border-radius: 99px; font-weight: 800; font-size: 0.85rem;
      letter-spacing: 2px; text-transform: uppercase;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="bg-bubble" style="width:200px;height:200px;left:10%;animation-duration:12s;animation-delay:0s;"></div>
<div class="bg-bubble" style="width:120px;height:120px;left:70%;animation-duration:9s;animation-delay:3s;"></div>
<div class="bg-bubble" style="width:80px;height:80px;left:40%;animation-duration:15s;animation-delay:6s;"></div>
<div class="bg-bubble" style="width:160px;height:160px;left:85%;animation-duration:11s;animation-delay:1s;"></div>
<div class="wrapper">
  <div>
    <h1 class="title">BURP 💨</h1>
    <p class="subtitle">Official Counter</p>
  </div>
  <div class="counter-card">
    <p class="count-label">Total Rips</p>
    <div class="count-display" id="count">0</div>
    <div class="streak-bar">
      <span>STREAK</span>
      <div class="streak-dots" id="streakDots"></div>
    </div>
  </div>
  <button class="burp-btn" id="burpBtn" onclick="burp()">💨 BURP!</button>
  <div class="controls">
    <button class="ctrl-btn" onclick="undo()">↩ Undo</button>
    <button class="ctrl-btn danger" onclick="resetCount()">✕ Reset</button>
  </div>
  <div class="stats">
    <div class="stat-box"><div class="stat-value" id="statBest">0</div><div class="stat-label">Best</div></div>
    <div class="stat-box"><div class="stat-value" id="statSession">0</div><div class="stat-label">Session</div></div>
    <div class="stat-box"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Streak</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const EMOJIS = ['💨','🟡','💛','✨','⚡','🌟','💫'];
  const MILESTONES = {5:'Warming Up!',10:'Getting Gassy!',25:'Rip City!',50:'BURP LEGEND!',100:'🏆 CENTURY BURP!'};
  let count = +localStorage.getItem('burpCount')||0;
  let best  = +localStorage.getItem('burpBest') ||0;
  let session=0, streak=0, lastBurpTime=0, history=[];
  const STREAK_MAX=5;
  function renderDots(){
    const c=document.getElementById('streakDots'); c.innerHTML='';
    for(let i=0;i<STREAK_MAX;i++){const d=document.createElement('div');d.className='dot'+(i<streak?' active':'');c.appendChild(d);}
  }
  function updateUI(){
    document.getElementById('count').textContent=count;
    document.getElementById('statBest').textContent=best;
    document.getElementById('statSession').textContent=session;
    document.getElementById('statStreak').textContent=streak;
    renderDots();
    localStorage.setItem('burpCount',count);
    localStorage.setItem('burpBest',best);
  }
  function bumpAnim(){const el=document.getElementById('count');el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');}
  function spawnParticles(x,y){
    for(let i=0;i<6;i++){
      const p=document.createElement('div');p.className='particle';
      const angle=(Math.PI*2/6)*i+Math.random()*0.5;
      const dist=60+Math.random()*60;
      p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
      p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
      p.style.left=x+'px';p.style.top=y+'px';
      p.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      document.body.appendChild(p);setTimeout(()=>p.remove(),800);
    }
  }
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
  function burp(){
    const btn=document.getElementById('burpBtn');
    const rect=btn.getBoundingClientRect();
    count++;session++;history.push(count);
    const now=Date.now();
    streak=(now-lastBurpTime<5000)?Math.min(streak+1,STREAK_MAX):1;
    lastBurpTime=now;
    if(count>best)best=count;
    bumpAnim();spawnParticles(rect.left+rect.width/2,rect.top+rect.height/2);
    updateUI();
    if(MILESTONES[count])showToast(MILESTONES[count]);
    if(navigator.vibrate)navigator.vibrate(40);
  }
  function undo(){if(!history.length)return;history.pop();count=history.length?history[history.length-1]:0;session=Math.max(0,session-1);streak=Math.max(0,streak-1);updateUI();showToast('Undone!');}
  function resetCount(){if(!count)return;if(!confirm('Reset your burp count to zero?'))return;count=0;session=0;streak=0;history=[];updateUI();showToast('Reset! Fresh air.');}
  document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();burp();}if(e.code==='KeyZ'&&e.ctrlKey)undo();});
  updateUI();
</script>
</body>
</html>
